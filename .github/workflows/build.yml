name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv \
            openjdk-17-jdk \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            libssl-dev \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libdb5.3-dev \
            libbz2-dev \
            libexpat1-dev \
            liblzma-dev \
            libffi-dev \
            ffmpeg \
            cmake \
            wget \
            curl

      - name: Install Python dependencies
        run: |
          python -m venv buildozer-venv
          source buildozer-venv/bin/activate
          pip install --upgrade pip
          pip install buildozer "cython<3.0"

      - name: Build APK
        run: |
          source buildozer-venv/bin/activate
          buildozer android debug
        env:
          # Accept Android SDK licenses
          ANDROID_SDK_ROOT: $HOME/.buildozer/android/platform/android-sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: senpcli-debug-apk
          path: bin/*.apk
          retention-days: 30
